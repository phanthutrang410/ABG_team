# .gitleaks.toml — allowlist false positives for D3+ scans
# Real secrets must still be caught; only document known non-secret matches.

title = "silent-shield"

[allowlist]
description = "Known non-secret strings that trip generic rules"
regexes = [
  '''GPU/Colab/Kaggle/RunPod''',
]
paths = [
  '''(^|/)reference-Learning-Analytics-AI/''',
  '''(^|/)\.env$''',
  '''(^|/)\.ai-log-private/''',
  '''(^|/)node_modules/''',
  '''(^|/)\.next/''',
  '''(^|/)\.venv/''',
]
